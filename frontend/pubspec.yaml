name: minder
description: AI-powered personal renewal tracking app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  get_storage: ^2.1.1
  google_fonts: ^6.2.1
  iconsax_flutter: ^1.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  http: ^1.2.0
  http_parser: ^4.0.0
  image_picker: ^1.1.2
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
